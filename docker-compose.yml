services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  search:
    image: search
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - API_KEY=${API_KEY}
      - AUTH_MODE=${AUTH_MODE:-none}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - QDRANT_URL=http://qdrant:6333
      - DATA_DIR=/data
      - SESSIONS_PATH=/data/sessions.json
      - REQUEST_LOG_PATH=/data/requests.log
      - PID_FILE=/data/search.pid
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - search_data:/data
    depends_on:
      - qdrant
    restart: unless-stopped

  ingestion:
    image: search
    command: ["python", "-m", "ingestion.run", "--data-dir", "/data"]
    environment:
      # Schedule defaults to 00:00â€“06:00 Europe/Berlin / 100 docs per source.
      # Override at deploy time (e.g. via .env) to use a different test window.
      - INGESTION_START_HOUR=${INGESTION_START_HOUR:-0}
      - INGESTION_START_MINUTE=${INGESTION_START_MINUTE:-0}
      - INGESTION_DURATION_MINUTES=${INGESTION_DURATION_MINUTES:-360}
      - INGESTION_LIMIT_PER_SOURCE=${INGESTION_LIMIT_PER_SOURCE:-100}
      - INGESTION_TZ=${INGESTION_TZ:-Europe/Berlin}
      - INGESTION_SOURCES=${INGESTION_SOURCES:-wiki,arxiv,gesetze,pubmed,rki,tagesschau,dw}
    volumes:
      - search_data:/data
    restart: unless-stopped

  filtering:
    image: search
    command: ["python", "-m", "filtering.run", "--data-dir", "/data"]
    volumes:
      - search_data:/data
    depends_on:
      - ingestion
    restart: unless-stopped

  indexing:
    image: search
    command: ["python", "-m", "indexing.run", "--data-dir", "/data", "--qdrant-url", "http://qdrant:6333"]
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - search_data:/data
    depends_on:
      - qdrant
      - filtering
    restart: unless-stopped

  stats-collector:
    image: search
    command: >
      sh -c 'while true; do
        TARGET=$$(TZ=Europe/Berlin date -d "tomorrow 06:30" +%s 2>/dev/null || date -d "06:30 tomorrow" +%s);
        NOW=$$(date +%s);
        SLEEP=$$((TARGET - NOW));
        if [ $$SLEEP -le 0 ]; then SLEEP=$$((SLEEP + 86400)); fi;
        echo "Sleeping $${SLEEP}s until next collection...";
        sleep $$SLEEP;
        python scripts/collect_stats.py --data-dir /data --qdrant-url http://qdrant:6333;
      done'
    environment:
      - TZ=Europe/Berlin
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - search_data:/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  search_data:
