<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* --- Header --- */
    .search-header {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .search-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #0f0f23;
      margin-bottom: 0.25rem;
    }

    .search-header .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    /* --- Search Form --- */
    .search-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    .search-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .search-btn {
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #6366f1;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover { background: #4f46e5; }
    .search-btn:active { transform: scale(0.97); }

    /* --- Filters --- */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-select {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      color: #475569;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }

    .filter-select:focus { border-color: #6366f1; }

    /* --- Status --- */
    .search-status {
      font-size: 0.8rem;
      color: #64748b;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 1rem;
    }

    .search-status.error {
      color: #ef4444;
    }

    /* --- Results --- */
    .result {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .result:last-child { border-bottom: none; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e40af;
      text-decoration: none;
      line-height: 1.3;
    }

    .result-title:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .badge-lang {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-source {
      background: #f0fdf4;
      color: #166534;
    }

    .result-url {
      font-size: 0.78rem;
      color: #16a34a;
      margin-bottom: 0.35rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-url a {
      color: inherit;
      text-decoration: none;
    }

    .result-url a:hover { text-decoration: underline; }

    .result-snippet {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #334155;
    }

    .result-snippet strong {
      color: #0f172a;
      background: #fef9c3;
      padding: 0.05em 0.15em;
      border-radius: 2px;
    }

    .result-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* --- Pagination --- */
    .pagination {
      display: flex;
      gap: 0.25rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .page-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #fff;
      color: #475569;
      cursor: pointer;
      transition: background 0.1s;
    }

    .page-btn:hover { background: #f1f5f9; }
    .page-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- Footer --- */
    .footer {
      text-align: center;
      padding: 2rem 0 1rem;
      font-size: 0.75rem;
      color: #cbd5e1;
    }

    /* --- Loading --- */
    .loading {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #94a3b8;
    }

    .empty-state svg {
      opacity: 0.3;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .search-header { padding: 2rem 0 1.5rem; }
      .search-header h1 { font-size: 1.5rem; }
      .search-form { flex-direction: column; }
      .search-btn { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="search-header">
    <h1>Search</h1>
    <p class="subtitle">Hybrid search across Wikipedia &amp; arXiv</p>
  </header>

  <form class="search-form" id="search-form">
    <input
      type="text"
      class="search-input"
      id="search-input"
      placeholder="Search..."
      autofocus
      autocomplete="off"
    >
    <button type="submit" class="search-btn">Search</button>
  </form>

  <div class="filters">
    <select class="filter-select" id="filter-lang">
      <option value="all">All languages</option>
      <option value="de">Deutsch</option>
      <option value="en">English</option>
    </select>
    <select class="filter-select" id="filter-source">
      <option value="all">All sources</option>
      <option value="wiki">Wikipedia</option>
      <option value="arxiv">arXiv</option>
    </select>
    <select class="filter-select" id="filter-mode">
      <option value="hybrid">Hybrid (BM25 + Vector)</option>
      <option value="bm25">BM25 only</option>
      <option value="vector">Vector only</option>
    </select>
    <select class="filter-select" id="filter-groupby">
      <option value="docs">Group by document</option>
      <option value="chunks">All chunks</option>
    </select>
  </div>

  <div id="results-container">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="22" cy="22" r="14" stroke="#94a3b8" stroke-width="3"/>
        <path d="M32 32L42 42" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <p>Enter a query to search across Wikipedia and arXiv papers.</p>
    </div>
  </div>

  <footer class="footer">v{{ version }}</footer>
</div>

<script>
(function() {
  const form = document.getElementById('search-form');
  const input = document.getElementById('search-input');
  const container = document.getElementById('results-container');
  const langSelect = document.getElementById('filter-lang');
  const sourceSelect = document.getElementById('filter-source');
  const modeSelect = document.getElementById('filter-mode');
  const groupBySelect = document.getElementById('filter-groupby');

  const PAGE_SIZE = 10;
  let currentPage = 0;
  let currentQuery = '';

  // Restore state from URL
  function restoreFromURL() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) {
      input.value = params.get('q');
      langSelect.value = params.get('lang') || 'all';
      sourceSelect.value = params.get('source') || 'all';
      modeSelect.value = params.get('mode') || 'hybrid';
      groupBySelect.value = params.get('group_by') || 'docs';
      currentPage = parseInt(params.get('page') || '0');
      doSearch();
    }
  }

  function updateURL() {
    const params = new URLSearchParams();
    params.set('q', input.value);
    if (langSelect.value !== 'all') params.set('lang', langSelect.value);
    if (sourceSelect.value !== 'all') params.set('source', sourceSelect.value);
    if (modeSelect.value !== 'hybrid') params.set('mode', modeSelect.value);
    if (groupBySelect.value !== 'docs') params.set('group_by', groupBySelect.value);
    if (currentPage > 0) params.set('page', currentPage.toString());
    history.replaceState(null, '', '?' + params.toString());
  }

  async function doSearch() {
    const q = input.value.trim();
    if (!q) return;
    currentQuery = q;
    updateURL();

    container.innerHTML = '<div class="loading"><span class="spinner"></span>Searching...</div>';

    const params = new URLSearchParams({
      q,
      lang: langSelect.value,
      source: sourceSelect.value,
      mode: modeSelect.value,
      group_by: groupBySelect.value,
      limit: PAGE_SIZE.toString(),
      offset: (currentPage * PAGE_SIZE).toString(),
    });

    try {
      const resp = await fetch('/v1/search?' + params.toString());
      const data = await resp.json();

      if (!resp.ok) {
        container.innerHTML = `<div class="search-status error">${data.error || 'Search failed'}</div>`;
        return;
      }

      renderResults(data);
    } catch (err) {
      container.innerHTML = `<div class="search-status error">Connection error: ${err.message}</div>`;
    }
  }

  function renderMarkdownSnippet(text) {
    // Convert **bold** to <strong> tags
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function renderResults(data) {
    if (!data.results || data.results.length === 0) {
      container.innerHTML = `
        <div class="search-status">No results for "${escapeHtml(data.query)}" (${data.took_ms}ms)</div>
      `;
      return;
    }

    let html = `<div class="search-status">${data.total} result${data.total !== 1 ? 's' : ''} (${data.took_ms}ms, mode: ${data.mode})</div>`;

    for (const r of data.results) {
      const date = r.timestamp ? r.timestamp.split('T')[0] : '';
      html += `
        <div class="result">
          <div class="result-header">
            <a class="result-title" href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>
            <span class="badge badge-lang">${escapeHtml(r.language)}</span>
            <span class="badge badge-source">${escapeHtml(r.source)}</span>
          </div>
          <div class="result-url"><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)}</a></div>
          <div class="result-snippet">${renderMarkdownSnippet(escapeHtml(r.snippet))}</div>
          <div class="result-meta">
            <span>Score: ${r.score}</span>
            ${r.matching_chunks ? `<span>${r.matching_chunks} matching chunk${r.matching_chunks > 1 ? 's' : ''}</span>` : ''}
            ${date ? `<span>${date}</span>` : ''}
          </div>
        </div>
      `;
    }

    // Pagination
    if (data.total >= PAGE_SIZE || currentPage > 0) {
      html += '<div class="pagination">';
      html += `<button class="page-btn" onclick="window.__searchPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>&laquo; Prev</button>`;
      html += `<button class="page-btn active">${currentPage + 1}</button>`;
      if (data.total >= PAGE_SIZE) {
        html += `<button class="page-btn" onclick="window.__searchPage(${currentPage + 1})">Next &raquo;</button>`;
      }
      html += '</div>';
    }

    container.innerHTML = html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  window.__searchPage = function(page) {
    if (page < 0) return;
    currentPage = page;
    doSearch();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    currentPage = 0;
    doSearch();
  });

  // Re-search when filters change
  [langSelect, sourceSelect, modeSelect, groupBySelect].forEach(el => {
    el.addEventListener('change', () => {
      if (input.value.trim()) {
        currentPage = 0;
        doSearch();
      }
    });
  });

  restoreFromURL();
})();
</script>
</body>
</html>
