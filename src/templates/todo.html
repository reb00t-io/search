<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo - Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .header {
      padding: 2rem 0 1.5rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #0f0f23;
      margin-bottom: 0.25rem;
    }

    .header .meta {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .header nav {
      font-size: 0.85rem;
    }

    .header nav a {
      color: #6366f1;
      text-decoration: none;
    }

    .header nav a:hover { text-decoration: underline; }

    /* ─── Markdown content ──────────────────────────────────────── */
    .md-content h1 { display: none; } /* hide top-level title, we have our own */

    .md-content h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f0f23;
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .md-content h2:first-child { margin-top: 0; }

    .md-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
      margin: 1.25rem 0 0.5rem;
    }

    .md-content p {
      font-size: 0.875rem;
      line-height: 1.7;
      color: #475569;
      margin-bottom: 0.5rem;
    }

    .md-content ul {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
    }

    .md-content ul li {
      position: relative;
      padding: 0.5rem 0.75rem 0.5rem 2rem;
      margin-bottom: 0.35rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #334155;
    }

    .md-content ul li::before {
      position: absolute;
      left: 0.75rem;
      top: 0.55rem;
    }

    /* Checkbox rendering */
    .md-content ul li input[type="checkbox"] {
      position: absolute;
      left: 0.65rem;
      top: 0.6rem;
      accent-color: #6366f1;
      pointer-events: none;
      margin: 0;
    }

    .md-content ul li:has(input[type="checkbox"]:checked) {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .md-content strong {
      font-weight: 600;
      color: #1e293b;
    }

    .md-content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      font-size: 0.8125em;
      background: #e8edf5;
      border-radius: 4px;
      padding: 0.1em 0.35em;
    }

    .md-content a {
      color: #6366f1;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .footer {
      text-align: center;
      padding: 2rem 0 1rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .header { padding: 1.5rem 0 1rem; }
      .header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <p class="meta">{{ deploy_date }}</p>
    <h1>Todo</h1>
    <nav><a href="/">Search</a> &middot; <a href="/chat">Chat</a> &middot; <a href="/stats">Stats</a> &middot; <a href="/logs">Logs</a></nav>
  </header>

  <div class="md-content" id="md-content"></div>

  <footer class="footer">v{{ version }} &middot; deployed {{ deploy_date }}</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
(function() {
  const raw = {{ todo_md | tojson }};
  const html = marked.parse(raw, { gfm: true, breaks: false });
  document.getElementById('md-content').innerHTML = html;
})();
</script>
</body>
</html>
